name: CI

on:
  push:
    branches: [main, research-upgrade-qit]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Run tests
        run: pytest -q
      - name: CLI smoke test
        run: python -m quantum_testing.cli pareto --matrix tests/fixtures/pareto_matrix.csv --algo ar-qiea --seed 42 --pop 8 --gens 5
